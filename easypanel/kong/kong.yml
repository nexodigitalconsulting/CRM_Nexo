# ============================================
# Kong API Gateway Configuration
# ============================================
# Configuración declarativa para Supabase self-hosted

_format_version: "2.1"
_transform: true

###
### Consumers / Credentials
###
consumers:
  - username: DASHBOARD

keyauth_credentials:
  - consumer: DASHBOARD
    key: ${SUPABASE_SERVICE_KEY}

  - consumer: DASHBOARD
    key: ${SUPABASE_ANON_KEY}

acls:
  - consumer: DASHBOARD
    group: admin

###
### Access Control Lists
###
acl_plugins:
  - name: acl
    service: admin-api
    config:
      hide_groups_header: true
      allow:
        - admin

###
### API Routes
###
services:
  ## GoTrue - Authentication
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  ## PostgREST - Database API
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  ## Realtime - WebSockets
  - name: realtime-v1
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  - name: realtime-v1-websocket
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1-websocket
        strip_path: true
        paths:
          - /realtime/v1/websocket
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  ## Storage
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false

  ## Edge Functions
  - name: functions-v1
    url: http://functions:9000/
    routes:
      - name: functions-v1
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors

  ## Admin API (internal only)
  - name: admin-api
    url: http://meta:8080/
    routes:
      - name: admin-api
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: cors

###
### Plugins (Global)
###
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - apikey
        - X-Client-Info
        - Range
        - prefer
      exposed_headers:
        - X-Total-Count
        - Content-Range
      credentials: true
      max_age: 3600
      preflight_continue: false
